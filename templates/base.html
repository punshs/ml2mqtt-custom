<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" type="text/css" href="{{ url_for('static',filename='styles/default.css') }}">
  <link rel="stylesheet" type="text/css" href="{{ url_for('static',filename='styles/components.css') }}">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title or "ml2mqtt" }}</title>
  <style>
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }
    .nav-hamburger {
      display: none;
      background: none;
      border: none;
      color: #8ab4de;
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0.5rem;
      -webkit-tap-highlight-color: transparent;
    }
    @media (max-width: 600px) {
      .nav-hamburger { display: block; }
      .nav-links {
        display: none;
        width: 100%;
        flex-direction: column;
        gap: 0;
        padding: 0;
      }
      .nav-links.open {
        display: flex;
      }
      .nav-links a {
        padding: 0.75rem 1rem;
        border-top: 1px solid #1a3a5c;
      }
    }
  </style>
</head>
<body>

<nav>
    <div class="nav-title">
        <a href="{{ url_for('model.home') }}" class="nav-logo">
            <img src="{{ url_for('static', filename='images/ml2mqtt.png') }}" alt="ML2MQTT Logo">
        </a>
      </div>

      <button class="nav-hamburger" id="navToggle" onclick="document.getElementById('navLinks').classList.toggle('open')">☰</button>

      <div class="nav-links" id="navLinks">
        <a href="{{ url_for('model.home') }}" class="{% if active_page == 'home' %}active{% endif %}">Home</a>
        <a href="{{ url_for('model.createModel') }}" class="{% if active_page == 'create_model' %}active{% endif %}">Add Model</a>
        <a href="{{ url_for('log.logs') }}" class="{% if active_page == 'logs' %}active{% endif %}">Logs</a>
      </div>
</nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>

</body>
</html>
